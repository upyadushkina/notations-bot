name = "notations-bot"
main = "worker.js"
compatibility_date = "2024-11-01"
workers_dev = true

[[d1_databases]]
binding = "DB"
database_name = "notations-bot"
database_id = "ebd433dc-855a-4b5b-b3a8-ebb2fdbf9464"

[assets]
directory = "./assets"
binding = "ASSETS"

# Secrets / vars (Cloudflare dashboard):
# - TELEGRAM_BOT_TOKEN (secret)
# - TELEGRAM_WEBHOOK_SECRET (optional secret)
# - ADMIN_PASSWORD (optional; default in code: bigbrother)
# - MAP_EXPLAINER_URL (optional HTTPS URL to mapping image if ASSETS unavailable)
